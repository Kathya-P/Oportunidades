<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8"/>
    <title>Alumno — Programa Oportunidades</title>

    <style>

        :root {
            --rojo: #C8102E;
            --rojo-dark: #A00E25;
            --negro: #141414;
            --gris-90: #222222;
            --gris-70: #4A4A4A;
            --gris-50: #7A7A7A;
            --gris-30: #B0B0B0;
            --gris-20: #D6D6D6;
            --gris-10: #F4F3F1;
            --blanco: #FFFFFF;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'DM Sans', sans-serif;
            background:var(--gris-10);
            color:var(--negro);
        }

        /* NAVBAR */
        nav{
            height:72px;
            background:rgba(20,20,20,0.98);
            border-bottom:1px solid rgba(255,255,255,0.05);
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 2.5rem;
            position:sticky;
            top:0;
            z-index:100;
            backdrop-filter:blur(12px);
        }

        .nav-left{ display:flex; align-items:center; gap:14px; cursor: pointer; text-decoration: none; }
        .nav-left:hover { opacity: 0.8; }
        .brand-info{ display:flex; flex-direction:column; }
        .brand-name{ color:var(--blanco); font-size:14px; font-weight:600; letter-spacing:0.02em; }
        .brand-sub{ color:#8D8D8D; font-size:11px; }

        .nav-links{ display:flex; align-items:center; gap:12px; }

        .nav-links a{
            color:#BABABA; text-decoration:none;
            font-size:13px; font-weight:500;
            padding:10px 14px; border-radius:8px;
            transition:0.15s ease;
        }

        .nav-links a:hover{ background:rgba(255,255,255,0.05); color:white; }

        .nav-links a.active{
            background:rgba(200,16,46,0.15);
            color:white;
            border:1px solid rgba(200,16,46,0.35);
        }

        .nav-links a.inicio {
            background: var(--rojo);
            color: var(--blanco);
        }

        .nav-links a.inicio:hover {
            background: var(--rojo-dark);
        }

        .logout{
            margin-left:10px;
            border-left:1px solid rgba(255,255,255,0.08);
            padding-left:18px;
        }

        /* CONTENIDO */
        .container{
            max-width:720px;
            margin:2.5rem auto;
            padding:0 2rem;
        }

        .page-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:1.5rem;
            gap:1rem;
            flex-wrap:wrap;
        }

        .page-header h1{
            font-size:2.2rem;
            font-weight:700;
            color:var(--negro);
            font-family:'DM Serif Display', serif;
            position:relative;
            padding-bottom:1rem;
        }

        .page-title h1::after{
            content:'';
            position:absolute;
            bottom:0;
            left:0;
            width:60px;
            height:4px;
            background:var(--rojo);
            border-radius:2px;
        }

        .page-title p{
            color:var(--gris-50);
            font-size:0.95rem;
            margin-top:0.5rem;
            font-weight:500;
        }

        .btn-back{
            border:1.5px solid var(--gris-20);
            color:var(--gris-70);
            padding:0.6rem 1rem;
            border-radius:9px;
            text-decoration:none;
            font-size:0.85rem;
            background:var(--blanco);
            font-weight:500;
            transition:0.2s;
        }

        .btn-back:hover{
            border-color:var(--rojo);
            color:var(--rojo);
            background:rgba(200,16,46,0.08);
        }

        /* CARD */
        .card{
            background:var(--blanco);
            border:1.5px solid #efefef;
            border-radius:18px;
            padding:2.8rem;
            box-shadow:0 8px 32px rgba(0,0,0,0.05);
            position:relative;
            overflow:hidden;
        }

        .card::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            right:0;
            height:4px;
            background:linear-gradient(90deg, var(--rojo) 0%, rgba(200,16,46,0.6) 100%);
            border-radius:18px 18px 0 0;
        }

        .card::after{
            content:'';
            position:absolute;
            width:240px;
            height:240px;
            background:radial-gradient(circle, rgba(200,16,46,0.03) 0%, transparent 70%);
            border-radius:50%;
            top:-60px;
            right:-60px;
        }

        /* ALERTA */
        .alert{
            padding:1rem 1.2rem;
            border-radius:12px;
            font-size:0.9rem;
            margin-bottom:1.5rem;
        }

        .alert-error{
            background:rgba(200,16,46,0.08);
            border:1px solid rgba(200,16,46,0.2);
            color:var(--rojo);
        }

        /* FORM */
        .field{
            margin-bottom:1.6rem;
        }

        .field label{
            display:block;
            font-size:0.85rem;
            color:var(--gris-70);
            margin-bottom:0.6rem;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:0.06em;
            display:flex;
            align-items:center;
            gap:6px;
        }

        .field label::before{
            content:'';
            width:3px;
            height:3px;
            background:var(--rojo);
            border-radius:50%;
            display:inline-block;
        }

        .field input,
        .field select{
            width:100%;
            padding:13px 15px;
            border:2px solid var(--gris-20);
            border-radius:12px;
            font-size:0.95rem;
            outline:none;
            transition:0.25s;
            background:var(--gris-10);
            color:var(--negro);
            font-family:'DM Sans', sans-serif;
            font-weight:500;
        }

        .field input::placeholder,
        .field select::placeholder{
            color:var(--gris-50);
        }

        .field input:focus,
        .field select:focus{
            border-color:var(--rojo);
            background:var(--blanco);
            box-shadow:0 0 0 4px rgba(200,16,46,0.12);
            border-width:2px;
        }

        .field input,
        .field select{
            width:100%;
            padding:12px 14px;
            font-size:0.9rem;
            border:1.5px solid var(--gris-20);
            border-radius:10px;
            outline:none;
            transition:0.2s;
            background:var(--blanco);
            font-family:'DM Sans', sans-serif;
        }

        .field input:focus,
        .field select:focus{
            border-color:var(--rojo);
            background:var(--blanco);
            box-shadow:0 0 0 3px rgba(200,16,46,0.08);
        }

        .field-row{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:1.2rem;
        }

        /* BOTONES */
        .form-actions{
            display:flex;
            justify-content:flex-end;
            gap:12px;
            margin-top:2.5rem;
            padding-top:2rem;
            border-top:2px solid #f0f0f0;
            flex-wrap:wrap;
            position:relative;
        }

        .form-actions::before{
            content:'';
            position:absolute;
            top:-2px;
            left:0;
            width:40px;
            height:2px;
            background:var(--rojo);
        }

        .btn{
            padding:0.75rem 1.5rem;
            border-radius:11px;
            font-size:0.92rem;
            font-weight:700;
            text-decoration:none;
            cursor:pointer;
            border:none;
            transition:0.25s;
            font-family:'DM Sans', sans-serif;
            letter-spacing:0.02em;
            text-transform:uppercase;
        }

        .btn-primary{
            background:var(--rojo);
            color:var(--blanco);
            box-shadow:0 6px 20px rgba(200,16,46,0.25);
        }

        .btn-primary:hover{
            background:var(--rojo-dark);
            transform:translateY(-2px);
            box-shadow:0 8px 28px rgba(200,16,46,0.35);
        }

        .btn-outline{
            background:var(--blanco);
            border:2px solid var(--gris-20);
            color:var(--gris-70);
        }

        .btn-outline:hover{
            border-color:var(--rojo);
            color:var(--rojo);
            background:rgba(200,16,46,0.06);
        }

        @media(max-width:640px){
            .container{
                padding:0 1rem;
            }
            .field-row{
                grid-template-columns:1fr;
            }
            .card{
                padding:1.3rem;
            }
            nav{
                padding:1rem;
            }
        }

    </style>

</head>

<body>

<nav>
    <a th:href="@{/admin}" class="nav-left" style="text-decoration: none; color: inherit;">
        <img src="/images/opor.png" alt="Logo Oportunidades" style="height:42px; width:auto;"/>
        <div class="brand-info">
            <span class="brand-name">Programa Oportunidades</span>
            <span class="brand-sub">Fundación Gloria Kriete</span>
        </div>
    </a>
    <div class="nav-links">
        <a th:href="@{/admin}" class="inicio">Inicio</a>
        <a th:href="@{/admin/usuarios}">Usuarios</a>
        <a th:href="@{/admin/secciones}">Secciones</a>
        <a th:href="@{/admin/alumnos}" class="active">Alumnos</a>
        <a th:href="@{/admin/estadisticas}">Estadísticas</a>
        <a th:href="@{/logout}" class="logout">Cerrar sesión</a>
    </div>
</nav>


<div class="container">

    <div class="page-header">

        <div>

            <h1 th:text="${titulo}">
                Alumno
            </h1>

            <p class="subtitle">
                Registro y edición de estudiantes del sistema
            </p>

        </div>
    </div>

    <div class="card">

        <div class="alert alert-error"
             th:if="${error}"
             th:text="${error}">
        </div>

        <form th:action="@{/admin/alumnos/guardar}"
              th:object="${alumno}"
              method="post">

            <input type="hidden"
                   th:field="*{idEstudiante}"/>

            <div class="field-row">

                <div class="field">

                    <label>
                        Nombre *
                    </label>

                    <input type="text"
                           th:field="*{nombre}"
                           placeholder="Ingrese el nombre"
                           required/>

                </div>

                <div class="field">

                    <label>
                        Apellido *
                    </label>

                    <input type="text"
                           th:field="*{apellido}"
                           placeholder="Ingrese el apellido"
                           required/>

                </div>

            </div>

            <div class="field">

                <label>
                    Código de barras *
                </label>

                <input type="text"
                       th:field="*{codigoBarras}"
                       placeholder="Ej. 0001"
                       required/>

            </div>

            <div class="field">

                <label>
                    Dirección
                </label>

                <input type="text"
                       th:field="*{direccion}"
                       placeholder="Ej. Ahuachapán"/>

            </div>

            <div class="field">

                <label>
                    Jornada
                </label>

                <select th:field="*{jornada}">
                    <option th:value="FULL_TIME" th:selected="${alumno.jornada == null or alumno.jornada.name() == 'FULL_TIME'}">Full time</option>
                    <option th:value="SABATINO" th:selected="${alumno.jornada != null and alumno.jornada.name() == 'SABATINO'}">Sabatino (solo sábados)</option>
                </select>

            </div>

            <div class="field">
    <label>Sección</label>
    <select name="grupos" id="selectSeccion">
        <option value="">— Sin sección —</option>
        <option th:each="s : ${secciones}"
                th:value="${s.idGrupo}"
                th:text="${s.nombre + (s.dias != null ? ' (' + s.dias.replace(',', '·') + ')' : '')}"
                th:attr="data-modalidad=${s.modalidad}"
                th:selected="${alumno.grupos != null && alumno.grupos.contains(s)}">
        </option>
    </select>
</div>

            <div class="form-actions">

                <a th:href="@{/admin/alumnos}"
                   class="btn btn-ghost">

                    Cancelar

                </a>

                <button type="submit"
                        class="btn btn-dark">

                    Guardar alumno

                </button>

            </div>

        </form>

    </div>

</div>
<script>
(function(){
    const jornadaSelect  = document.querySelector('select[name="jornada"], #jornada, [id*="jornada"]');
    const seccionSelect  = document.getElementById('selectSeccion');

    function filtrarSecciones() {
        const jornada = jornadaSelect ? jornadaSelect.value : 'FULL_TIME';
        Array.from(seccionSelect.options).forEach(opt => {
            if (!opt.value) return; // opción vacía siempre visible
            const mod = opt.getAttribute('data-modalidad') || 'FULL_TIME';
            opt.hidden = (mod !== jornada);
        });
        // si la opción seleccionada quedó oculta, resetear
        const seleccionada = seccionSelect.options[seccionSelect.selectedIndex];
        if (seleccionada && seleccionada.hidden) seccionSelect.value = '';
    }

    if (jornadaSelect) {
        jornadaSelect.addEventListener('change', filtrarSecciones);
        filtrarSecciones(); // aplicar al cargar
    }
})();
</script>
</body>
</html>
