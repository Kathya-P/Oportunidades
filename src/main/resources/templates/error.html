<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Error del sistema — Programa Oportunidades</title>
<link rel="stylesheet" th:href="@{/css/responsive.css}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
          rel="stylesheet"/>

    <style>

        :root {

            --rojo:       #C8102E;
            --rojo-dark:  #A00E25;
            --rojo-light: #F5D0D7;

            --negro:      #141414;

            --gris-90:    #222222;
            --gris-70:    #4A4A4A;
            --gris-50:    #7A7A7A;
            --gris-20:    #D6D6D6;
            --gris-10:    #F0EFED;

            --blanco:     #FFFFFF;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        .brand img{ height: 42px; width: auto; }

        .brand-icon{

            width:32px;
            height:32px;

            background:var(--rojo);

            border-radius:7px;

            display:flex;
            align-items:center;
            justify-content:center;
        }

        .brand-icon svg{

            width:17px;
            height:17px;

            stroke:white;
            fill:none;

            stroke-width:2;
            stroke-linecap:round;
            stroke-linejoin:round;
        }

        .brand-name{

            font-size:14px;
            font-weight:500;

            color:var(--gris-70);
        }

        .card{

            background:var(--blanco);

            border:1px solid var(--gris-20);

            border-radius:16px;

            padding:3rem 2.5rem;

            width:100%;
            max-width:500px;

            text-align:center;
        }

        .icon-wrap{

            width:72px;
            height:72px;

            background:var(--gris-10);

            border:1px solid var(--gris-20);

            border-radius:50%;

            display:flex;
            align-items:center;
            justify-content:center;

            margin:0 auto 1.5rem;
        }

        .icon-wrap svg{

            width:32px;
            height:32px;

            stroke:var(--rojo);

            fill:none;

            stroke-width:1.8;

            stroke-linecap:round;
            stroke-linejoin:round;
        }

        .code{

            font-family:'DM Serif Display', serif;

            font-size:5rem;

            line-height:1;

            color:var(--rojo);

            margin-bottom:0.4rem;
        }

        .eyebrow{

            font-size:10px;
            font-weight:600;

            letter-spacing:0.12em;
            text-transform:uppercase;

            color:var(--gris-50);

            margin-bottom:1rem;
        }

        .mensaje{

            font-size:14px;

            color:var(--gris-70);

            line-height:1.7;

            margin-bottom:1.5rem;
        }

        .detalle-error{

            background:#FFF5F5;

            border:1px solid #F5D0D7;

            color:#7A1C2E;

            border-radius:10px;

            padding:1rem;

            font-size:13px;

            line-height:1.6;

            margin-bottom:2rem;

            text-align:left;

            word-break:break-word;
        }

        .divider{

            height:1px;

            background:var(--gris-10);

            margin-bottom:1.5rem;
        }

        .btn{

            display:inline-flex;
            align-items:center;
            justify-content:center;

            gap:8px;

            width:100%;

            padding:11px 20px;

            background:var(--negro);

            color:var(--blanco);

            border:none;

            border-radius:8px;

            font-size:14px;
            font-weight:500;

            text-decoration:none;

            transition:background 0.15s;
        }

        .btn svg{

            width:15px;
            height:15px;

            stroke:white;
            fill:none;

            stroke-width:2;

            stroke-linecap:round;
            stroke-linejoin:round;
        }

        .btn:hover{
            background:var(--gris-90);
        }

        .footer{

            margin-top:2rem;

            font-size:11px;

            color:var(--gris-50);
        }

    </style>

</head>

<body>

<div class="brand">

    <img src="/images/opor.png" alt="Logo Oportunidades"/>

    <span class="brand-name">
        Programa Oportunidades
    </span>

</div>

<div class="card">

    <div class="icon-wrap">

        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <circle cx="12" cy="16" r="1"/>
        </svg>

    </div>

    <div class="code">
        500
    </div>

    <p class="eyebrow"
       th:text="${titulo}">
        Error del sistema
    </p>

    <p class="mensaje">
        Ocurrió un problema mientras se procesaba la solicitud.<br/>
        El error fue capturado por el sistema de manejo global de excepciones.
    </p>

    <div class="detalle-error"
         th:text="${mensaje}">

    </div>

    <div class="divider"></div>

    <a href="javascript:history.back()"
       class="btn">

        <svg viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
        </svg>

        Volver

    </a>

</div>

<p class="footer">
    FGK &copy; 2026 &mdash; Sistema institucional
</p>

</body>
</html>
