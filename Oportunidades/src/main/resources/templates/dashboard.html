<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <style>
        :root{
            --rojo:#C8102E;
            --negro:#141414;
            --gris-50:#7A7A7A;
            --gris-20:#D6D6D6;
            --gris-10:#F4F3F1;
            --blanco:#FFF;
        }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ font-family:'DM Sans', sans-serif; background:var(--gris-10); color:var(--negro); }
        nav{ height:72px; background:#141414; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; }
        .brand{ color:white; font-weight:800; font-size:14px; }
        .nav-right{ display:flex; align-items:center; gap:10px; }
        .user-chip{ padding:9px 14px; border-radius:999px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); font-size:12px; font-weight:500; color:#BABABA; }
        .logout{ text-decoration:none; color:var(--rojo); font-size:13px; font-weight:700; padding:10px 12px; border-radius:10px; }
        .logout:hover{ background:rgba(200,16,46,0.12); }
        .container{ max-width:1100px; margin:2.5rem auto; padding:0 1.2rem; }
        .title{ font-size:22px; font-weight:900; margin-bottom:16px; }
        .sub{ color:var(--gris-50); margin-bottom:18px; }
        .grid{ display:grid; grid-template-columns: 440px 1fr; gap:1.2rem; align-items:start; }
        @media(max-width:900px){ .grid{ grid-template-columns:1fr; } }
        .card{ background:var(--blanco); border:1px solid #ececec; border-radius:18px; padding:16px 18px; }
        .link{ display:inline-flex; text-decoration:none; font-weight:800; color:#4A4A4A; padding:10px 12px; border-radius:10px; border:1px solid var(--gris-20); }
        .link:hover{ border-color:var(--negro); color:var(--negro); }

        /* agranda el widget en este dashboard */
        .dash-calendar .mini-day{ padding:7px 2px; font-size:12.5px; }
        .dash-calendar .mini-day-name{ font-size:10.5px; padding:6px 0; }
    </style>
</head>
<body>

<nav>
    <div class="brand">Oportunidades</div>
    <div class="nav-right">
        <span class="user-chip" sec:authentication="name">usuario</span>
        <a class="logout" th:href="@{/logout}">Cerrar sesión</a>
    </div>
</nav>

<div class="container">
    <div class="title">Bienvenido al sistema</div>
    <div class="sub">Resumen del calendario académico del mes.</div>

    <div class="grid">
        <div class="dash-calendar" th:replace="~{calendario/widget-calendario :: widget}"></div>
        <div class="card">
            <div style="font-weight:900; margin-bottom:10px;">Accesos</div>
            <a class="link" th:href="@{/calendario}">Ver calendario completo</a>
        </div>
    </div>
</div>

</body>
</html>
