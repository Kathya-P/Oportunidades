<!--
    ╔══════════════════════════════════════════════════════════════════════╗
    ║  FRAGMENTO: mini-calendario para dashboards                         ║
    ║  Uso en cualquier dashboard:                                        ║
    ║    <div th:replace="~{calendario/widget-calendario :: widget}"></div>║
    ║                                                                     ║
    ║  El controller del dashboard debe agregar al Model:                 ║
    ║    model.addAttribute("calHoy", LocalDate.now());                   ║
    ║    model.addAttribute("calPeriodoActual", calendarioService         ║
    ║         .periodoActual().orElse(null));                             ║
    ║    model.addAttribute("calDiasEsp",                                 ║
    ║         calendarioService.diasEnRango(inicio, fin));                ║
    ║    model.addAttribute("calEsBloqueado",                             ║
    ║         calendarioService.esHoyDiaBloqueado());                     ║
    ║    model.addAttribute("calMotivoBloqueo",                           ║
    ║         calendarioService.motivoBloqueoHoy());                      ║
    ╚══════════════════════════════════════════════════════════════════════╝
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<body>

<div th:fragment="widget">
    <style>
        /* ── Widget Calendario ──────────────────────────────────────────── */
        .cal-widget {
            background: white;
            border-radius: 14px;
            border: 1px solid #D6D6D6;
            overflow: hidden;
        }

        .cal-widget-header {
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #F4F3F1;
        }

        .cal-widget-title {
            font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px;
        }

        .cal-widget-link {
            font-size: 11.5px; color: #C8102E; text-decoration: none; font-weight: 600;
        }
        .cal-widget-link:hover { text-decoration: underline; }

        /* Banner de día bloqueado */
        .bloqueo-banner {
            margin: 12px 14px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #FFF5E7;
            border: 1px solid #FEC84B;
            color: #B54708;
            font-size: 12.5px;
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }

        /* Período activo */
        .periodo-chip {
            margin: 0 14px 10px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #ECFDF3;
            border: 1px solid #6CE9A6;
            color: #027A48;
            font-size: 12px;
            font-weight: 600;
        }
        .periodo-chip .p-sub { font-weight: 400; color: #059952; font-size: 11px; margin-top:2px; }

        /* Mini calendario */
        .mini-cal { padding: 0 14px 14px; }

        .mini-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .mini-day-name {
            text-align: center; font-size: 10px; font-weight: 700;
            color: #7A7A7A; padding: 4px 0; text-transform: uppercase;
        }

        .mini-day {
            text-align: center;
            padding: 5px 2px;
            font-size: 11.5px;
            border-radius: 5px;
            font-weight: 500;
            position: relative;
            color: #141414;
        }

        .mini-day.hoy {
            background: #C8102E;
            color: white;
            font-weight: 700;
        }

        .mini-day.bloqueado {
            background: #FFF5E7;
            color: #B54708;
        }

        .mini-day.en-periodo:not(.hoy):not(.bloqueado) {
            background: #F0FDF4;
        }

        .mini-day.vacio { color: transparent; pointer-events: none; }

        /* Lista de próximos eventos */
        .eventos-list { padding: 0 14px 12px; }
        .evento-item {
            display: flex; align-items: flex-start; gap:8px;
            padding: 6px 0;
            border-bottom: 1px solid #F4F3F1;
            font-size: 12px;
        }
        .evento-item:last-child { border-bottom: none; }
        .evento-dot {
            width: 8px; height: 8px; border-radius: 50%;
            flex-shrink: 0; margin-top: 4px;
        }
        .dot-festivo { background: #F97066; }
        .dot-asueto  { background: #FDB022; }
        .dot-semana  { background: #53B1FD; }
        .evento-nombre { font-weight: 600; color: #141414; line-height: 1.3; }
        .evento-fecha  { color: #7A7A7A; font-size: 11px; }

        .no-eventos { padding: 10px 14px 12px; font-size: 12px; color: #7A7A7A; font-style: italic; }
    </style>

    <div class="cal-widget">
        <!-- Header -->
        <div class="cal-widget-header">
            <div class="cal-widget-title">📅 Calendario Académico</div>
            <a th:href="@{/calendario}" class="cal-widget-link">Ver todo →</a>
        </div>

        <!-- Banner de bloqueo (solo si hoy es día especial) -->
        <div th:if="${calEsBloqueado}" class="bloqueo-banner">
            🚫 Hoy: <span th:text="${calMotivoBloqueo}">Día de asueto</span>
            — Asistencia bloqueada
        </div>

        <!-- Período actual -->
        <div th:if="${calPeriodoActual != null}" class="periodo-chip">
            <div>📚 <span th:text="${calPeriodoActual.nombre}">Período I</span></div>
            <div class="p-sub"
                 th:text="${#temporals.format(calPeriodoActual.fechaInicio,'dd/MM/yyyy')} + ' – ' + ${#temporals.format(calPeriodoActual.fechaFin,'dd/MM/yyyy')}">
            </div>
        </div>

        <!-- Mini calendar grid -->
        <div class="mini-cal" th:if="${calDiasEnMes != null}">
            <div class="mini-cal-grid">
                <!-- días de la semana -->
                <div class="mini-day-name">D</div>
                <div class="mini-day-name">L</div>
                <div class="mini-day-name">M</div>
                <div class="mini-day-name">X</div>
                <div class="mini-day-name">J</div>
                <div class="mini-day-name">V</div>
                <div class="mini-day-name">S</div>

                <!-- celdas vacías -->
                <th:block th:if="${calPrimerDia > 0}" th:each="i : ${#numbers.sequence(0, calPrimerDia - 1)}">
                    <div class="mini-day vacio">0</div>
                </th:block>

                <!-- días -->
                <th:block th:each="d : ${#numbers.sequence(1, calDiasEnMes)}">
                    <th:block th:with="
                        fecha=${T(java.time.LocalDate).of(calAnio, calMes, d)},
                        esHoy=${fecha.equals(calHoy)},
                        esBlq=${calDiasEsp != null and !calDiasEsp.?[bloqueaAsistencia and !fechaInicio.isAfter(#vars.fecha) and (fechaFin == null or !fechaFin.isBefore(#vars.fecha))].isEmpty()},
                        enPer=${calPeriodoActual != null and !calPeriodoActual.getFechaInicio().isAfter(fecha) and !calPeriodoActual.getFechaFin().isBefore(fecha)}
                    ">
                        <div class="mini-day"
                             th:classappend="${esHoy ? 'hoy ' : ''} + ${esBlq ? 'bloqueado ' : ''} + ${enPer ? 'en-periodo ' : ''}"
                             th:text="${d}">1</div>
                    </th:block>
                </th:block>
            </div>
        </div>

        <!-- Próximos días especiales -->
        <div th:if="${calDiasEsp != null and !calDiasEsp.isEmpty()}" class="eventos-list">
            <div th:each="de : ${calDiasEsp}" class="evento-item">
                <div class="evento-dot"
                     th:classappend="${de.tipo.name() == 'FESTIVO' ? 'dot-festivo' : (de.tipo.name() == 'ASUETO' ? 'dot-asueto' : 'dot-semana')}">
                </div>
                <div>
                    <div class="evento-nombre" th:text="${de.nombre}">Semana Santa</div>
                    <div class="evento-fecha"
                         th:text="${#temporals.format(de.fechaInicio,'dd/MM')} + (${de.fechaFin == null or de.fechaInicio.equals(de.fechaFin)} ? '' : ' – ' + ${#temporals.format(de.fechaFin,'dd/MM')})">
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${calDiasEsp == null or calDiasEsp.isEmpty()}" class="no-eventos">
            Sin eventos especiales este mes.
        </div>

    </div>
</div>

</body>
</html>
